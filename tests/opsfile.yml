version: 3
tasks:

  all:
    desc: All tests
    silent: true
    cmds:
    - task: 7zz
    - task: coreutils
    - task: bun
    - task: kubectl
    - task: kind
    - task: k3sup
    - task: rg

  7zz:
    silent: true
    desc: 7zz test
    cmds:
    - 7zz | rg 24.07

  coreutils:
    silent: true
    desc: Coreutils test
    cmds:
    - coreutils | rg '0.0.27'

  bun:
    silent: true
    desc: Bun test
    cmds:
    - bun --version | rg '^1.3.14$'

  kubectl:
    silent: true
    desc: Kubectl test
    cmds:
    - kubectl version --client=true | rg 1.30.3

  kind:
    silent: true
    desc: Kind test
    cmds:
    - kind --version | rg 0.17.0

  k3sup:
    silent: true
    desc: k3sup test
    cmds:
    - k3sup version | rg 0.13.6

  rg:
    silent: true
    desc: ripgrep test
    cmds:
    - rg --version | rg 14.1.0
   
