version: "3"

vars:
  # Leave empty to let k3sup install its current stable default.
  K3S_VERSION: ""
  SSH: "ssh -oStrictHostKeyChecking=no"
  CERTMANAGER: "https://github.com/cert-manager/cert-manager/releases/download/v1.11.0/cert-manager.yaml"

env:
  KUBECONFIG:
    sh: |-
      if test -e "$OPS_TMP/kubeconfig"
      then echo "$OPS_TMP/kubeconfig"
      else echo ~/.kube/config
      fi

tasks:
  get-cert-manager:
    cmds:
      - curl -L "{{.CERTMANAGER}}" >cert-manager.yaml

  install:
    silent: true
    #desc: install k3s with ssh in <server> using <user> with sudo
    vars:
      INSTALL_USER: '{{._user_ | default "root"}}'
    cmds:
      - test -n "{{._server_}}" || die "required <server> ip or hostname"
      - |
        K3S_VERSION_FLAG=""
        if test -n "{{.K3S_VERSION}}"
        then
          K3S_VERSION_FLAG="--k3s-version={{.K3S_VERSION}}"
        fi
        k3sup install $K3S_VERSION_FLAG \
          --host="{{._server_}}" \
          --user="{{.INSTALL_USER}}" \
          --local-path="$OPS_TMP/kubeconfig"
    

  cert-manager:
    silent: true
    #desc: install cert-manager
    cmds:
      - kubectl --kubeconfig $OPS_TMP/kubeconfig apply -f cert-manager.yaml

  create:
    silent: true
    desc: create a k3s with ssh in <server> using <username> with sudo
    cmds:
      - config OPERATOR_CONFIG_KUBE=k3s
      - task: install
      - task: cert-manager
      - cp "$OPS_TMP/kubeconfig" "$OPS_TMP/k3s-{{._server_}}.kubeconfig"

  delete:
    silent: true
    desc: uninstall with ssh in <server> using <username> with sudo
    cmds:
      - test -n "{{._server_}}" || die "please use <server>"
      - "{{.SSH}} '{{._user_}}@{{._server_}}' sudo /usr/local/bin/k3s-uninstall.sh"
      - rm "$OPS_TMP/kubeconfig" "$OPS_TMP/k3s-{{._server_}}.kubeconfig"
    vars:
      USERNAME: '{{.USERNAME | default "root"}}'

  status:
    desc: status of the server
    silent: true
    cmds:
      - |
        if test -e $OPS_TMP/kubeconfig
        then {{.RUN}} kubectl get nodes
        else echo "No Cluster Installed"
        fi

  info:
    silent: true
    desc: info on the server
    cmds:
      - echo KUBECONFIG="$KUBECONFIG"
      - echo SERVER_HOST="$SERVER_HOST"
      - echo SERVER_USERNAME="$SERVER_USERNAME"

  tunnel-start:
    silent: true
    desc: start a local tunnel to the remote k3s apiserver when K3S_AUTOSSH=1
    vars:
      INSTALL_USER: '{{._user_ | default "root"}}'
    cmds:
      - test -n "{{._server_}}" || die "please use <server>"
      - |
        if test "${K3S_AUTOSSH:-0}" != "1"
        then
          exit 0
        fi

        SSH_HOST="${K3S_SSH_HOST:-{{._server_}}}"
        LOCAL_PORT="${K3S_AUTOSSH_LOCAL_PORT:-16443}"
        REMOTE_PORT="${K3S_AUTOSSH_REMOTE_PORT:-6443}"
        TUNNEL_BIN="autossh"
        TUNNEL_ARGS="-M 0"

        if command -v nc >/dev/null 2>&1 && nc -z 127.0.0.1 "$LOCAL_PORT" >/dev/null 2>&1
        then
          echo "k3s apiserver tunnel already listening on 127.0.0.1:$LOCAL_PORT"
          exit 0
        fi

        if ! command -v autossh >/dev/null 2>&1
        then
          echo "WARNING: autossh not available, falling back to ssh tunnel"
          TUNNEL_BIN="ssh"
          TUNNEL_ARGS=""
        fi

        $TUNNEL_BIN $TUNNEL_ARGS -f -N \
          -oExitOnForwardFailure=yes \
          -oServerAliveInterval=30 \
          -oServerAliveCountMax=3 \
          -oStrictHostKeyChecking=no \
          -L "${LOCAL_PORT}:127.0.0.1:${REMOTE_PORT}" \
          "{{.INSTALL_USER}}@${SSH_HOST}"

  kubeconfig:
    desc: recover the kubeconfig from a K3S server <server> with user <user>
    vars:
      INSTALL_USER: '{{._user_ | default "root"}}'
    cmds:
      - test -n "{{._server_}}" || die "please use <server>"
      - task: tunnel-start
        vars:
          _server_: '{{._server_}}'
          _user_: '{{.INSTALL_USER}}'
      - |
        SSH_HOST="${K3S_SSH_HOST:-{{._server_}}}"
        if test "${K3S_AUTOSSH:-0}" = "1"
        then
          LOCAL_PORT="${K3S_AUTOSSH_LOCAL_PORT:-16443}"
          {{.SSH}} "{{.INSTALL_USER}}@${SSH_HOST}" sudo cat /etc/rancher/k3s/k3s.yaml \
            | awk '/server:/ {$0="    server: https://127.0.0.1:'"$LOCAL_PORT"'"} 1' \
            >"$OPS_TMP/kubeconfig"
        else
          {{.SSH}} "{{.INSTALL_USER}}@${SSH_HOST}" sudo cat /etc/rancher/k3s/k3s.yaml \
            | replace --stdin -s '127.0.0.1' -r "$SSH_HOST" \
            >"$OPS_TMP/kubeconfig"
        fi
      - cp "$OPS_TMP/kubeconfig" "$OPS_TMP/k3s-{{._server_}}.kubeconfig"
